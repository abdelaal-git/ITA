# Synthesis
SYNTH_STRATEGY: "DELAY 4"
USE_SLANG: true

# Floorplan
FP_CORE_UTIL: 30
FP_ASPECT_RATIO: 1.5
IO_PIN_ORDER_CFG: dir::pin_order.cfg

# PDN
PDN_VOFFSET: 5
PDN_HOFFSET: 5
PDN_VWIDTH: 1.6
PDN_HWIDTH: 1.6
PDN_VPITCH: 120
PDN_HPITCH: 120
