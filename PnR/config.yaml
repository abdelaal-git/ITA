MAX_FANOUT_CONSTRAINT: 14
MAX_TRANSITION_CONSTRAINT: 1.2
# MAX_CAPACITANCE_CONSTRAINT: 0.5
CLOCK_UNCERTAINTY_CONSTRAINT: 0.1
TIME_DERATING_CONSTRAINT: 4
IO_DELAY_CONSTRAINT: 10

# Routing
GRT_ALLOW_CONGESTION: true
GRT_ADJUSTMENT: 0.10
RUN_POST_GRT_RESIZER_TIMING: true
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.05
GRT_RESIZER_SETUP_SLACK_MARGIN: true
GRT_DESIGN_REPAIR_MAX_WIRE_LENGTH: 600
GRT_DESIGN_REPAIR_MAX_SLEW_PCT: 30
GRT_DESIGN_REPAIR_MAX_CAP_PCT: 30

# Antenna
RUN_ANTENNA_REPAIR: true
RUN_HEURISTIC_DIODE_INSERTION: true
HEURISTIC_ANTENNA_THRESHOLD: 80
DIODE_ON_PORTS: "none"
GRT_ANTENNA_REPAIR_MARGIN: 10
GRT_ANTENNA_REPAIR_ITERS: 2
DIODE_PADDING: 0

# STA
STA_THREADS: 2
