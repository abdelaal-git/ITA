# Placement
PL_ROUTABILITY_DRIVEN: true
PL_TIMING_DRIVEN: false
# PL_WIRE_LENGTH_COEF: 0.01
PL_TARGET_DENSITY_PCT: 36
RUN_POST_GPL_DESIGN_REPAIR: true
RUN_POST_CTS_RESIZER_TIMING: true
PL_RESIZER_HOLD_SLACK_MARGIN: 0.03
PL_RESIZER_ALLOW_SETUP_VIOS: false
PL_RESIZER_SETUP_SLACK_MARGIN: 0.1
DESIGN_REPAIR_MAX_WIRE_LENGTH: 1000

# Clock Tree Synthesis
RUN_CTS: true
CTS_MAX_CAP: 0.3
CTS_SINK_CLUSTERING_SIZE: 12
CTS_SINK_CLUSTERING_MAX_DIAMETER: 30
CTS_CLK_BUFFERS: [sky130_fd_sc_hd__clkbuf_8 sky130_fd_sc_hd__clkbuf_4]
CTS_CLK_MAX_WIRE_LENGTH: 1000

# Timing and Design optimization
